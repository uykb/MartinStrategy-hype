services:
  martinstrategy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: martinstrategy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 以下为默认值，可按需覆盖
      MARTIN_EXCHANGE_SYMBOL: "HYPE"
      MARTIN_EXCHANGE_USE_TESTNET: "false"
      MARTIN_STRATEGY_MAX_SAFETY_ORDERS: "9"
      MARTIN_STRATEGY_ATR_PERIOD: "14"
      MARTIN_STRATEGY_BASE_RATIO: "0.05"
      MARTIN_STORAGE_SQLITE_PATH: "/app/data/bot.db"
      MARTIN_LOG_LEVEL: "info"
      MARTIN_HEALTH_ADDR: ":8080"
    volumes:
      - bot-data:/app/data
      - ./config.yaml:/app/config.yaml:ro  # ← 密钥通过配置文件挂载，不依赖环境变量

volumes:
  bot-data:
