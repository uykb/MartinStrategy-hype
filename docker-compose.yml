services:
  martinstrategy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: martinstrategy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # вҡ пёҸ йҰ–ж¬ЎйғЁзҪІпјҡcp config.yaml.example config.yaml && зј–иҫ‘еЎ«е…ҘеҜҶй’Ҙ
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      - MARTIN_EXCHANGE_API_KEY=${MARTIN_EXCHANGE_API_KEY}
      - MARTIN_EXCHANGE_API_SECRET=${MARTIN_EXCHANGE_API_SECRET}
volumes:
  data: