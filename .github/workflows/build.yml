name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Vet & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test (race)
        run: go test -race -timeout 5m ./...

  build:
    name: Build Linux amd64
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true

      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o bot ./cmd/bot/

      - name: Verify static linkage
        run: file bot | grep -q "statically linked" || (echo "binary is not static" && exit 1)

      - name: Package tarball
        run: tar -czf bot-linux-amd64.tar.gz bot .env.example

      - name: Generate checksum
        run: sha256sum bot-linux-amd64.tar.gz > bot-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-linux-amd64
          path: |
            bot-linux-amd64.tar.gz
            bot-linux-amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bot-linux-amd64
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/bot-linux-amd64.tar.gz
            release/bot-linux-amd64.tar.gz.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
